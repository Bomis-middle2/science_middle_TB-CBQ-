<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habitats and Adaptations</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
background:linear-gradient(
135deg,
#f4fbff,
#e3f2fd,
#fefce8
);
position:relative;
}

/* Habitat Theme Background */

body::before{
content:"🌵 🐪 🌿 🌳 ❄️ 🐾 🌵 🌿";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
font-size:70px;
opacity:0.05;
display:flex;
justify-content:space-around;
align-items:center;
flex-wrap:wrap;
pointer-events:none;
animation:habitatFloat 30s linear infinite;
}

body::after{
content:"🌴 🦌 🐅 🌧️ 🌲 🐾";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
font-size:55px;
opacity:0.04;
display:flex;
justify-content:space-evenly;
align-items:center;
flex-wrap:wrap;
pointer-events:none;
animation:habitatFloatReverse 36s linear infinite;
}

@keyframes habitatFloat{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-30px);
}

100%{
transform:translateY(0);
}

}

@keyframes habitatFloatReverse{

0%{
transform:translateY(0);
}

50%{
transform:translateY(25px);
}

100%{
transform:translateY(0);
}

}

#logoScreen{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#logoScreen img{
width:180px;
animation:logoPop 1s ease;
}

@keyframes logoPop{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.container{
max-width:950px;
margin:20px auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:22px;
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

h1{
text-align:center;
color:#1565c0;
font-size:2.2rem;
}

h2{
text-align:center;
margin-top:15px;
color:#333;
}

.btn{
background:#1565c0;
color:white;
border:none;
padding:14px 28px;
border-radius:12px;
cursor:pointer;
font-size:1rem;
transition:.3s;
}

.btn:hover{
background:#0d47a1;
}

.hidden{
display:none;
}

.topBar{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.scoreBox,
.timerBox,
.questionBox{
background:#e3f2fd;
padding:10px 16px;
border-radius:12px;
font-weight:bold;
color:#0d47a1;
}

.audioBtn{
background:#555;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

.question{
font-size:1.15rem;
line-height:1.6;
margin-bottom:20px;
color:#222;
}

.questionImage{
width:100%;
max-height:340px;
object-fit:contain;
background:#fff;
border-radius:15px;
padding:10px;
margin-bottom:20px;
border:2px solid #bbdefb;
}

.options{
display:grid;
gap:12px;
}

.optionBtn{
padding:14px;
border:none;
border-radius:12px;
background:#f8fbff;
cursor:pointer;
font-size:1rem;
text-align:left;
transition:.3s;
}

.optionBtn:hover{
background:#dbeafe;
}

.correct{
background:#d4f7d9 !important;
border:2px solid green;
}

.wrong{
background:#ffd9d9 !important;
border:2px solid red;
}

.feedback{
display:none;
padding:15px;
margin-top:15px;
border-radius:12px;
font-weight:bold;
line-height:1.6;
}

.correctFeedback{
background:#d4f7d9;
}

.wrongFeedback{
background:#ffd9d9;
}

.hintBox{
display:none;
margin-top:15px;
padding:14px;
background:#fff8d6;
border-left:5px solid orange;
border-radius:10px;
font-weight:bold;
}

.confetti{
position:fixed;
width:12px;
height:12px;
background:#42a5f5;
border-radius:50%;
animation:fall 2s linear forwards;
z-index:999;
}

@keyframes fall{

0%{
transform:translateY(-20px);
opacity:1;
}

100%{
transform:translateY(100vh);
opacity:0;
}

}

.cross{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
color:red;
animation:fade 1s forwards;
z-index:999;
}

@keyframes fade{

0%{
opacity:1;
}

100%{
opacity:0;
}

}

@media(max-width:600px){

.question{
font-size:1rem;
}

.optionBtn{
font-size:.95rem;
}

}

</style>

</head>

<body>

<div id="logoScreen">
<img src="assets/innovine-logo.png">
</div>

<div class="container">

<div id="introScreen" class="card">

<h1>Habitats and Adaptations</h1>

<h2>Grade 6 Science</h2>

<p style="margin-top:25px;text-align:center;line-height:1.6;">
Explore habitats, adaptations,
food chains, biodiversity and conservation
through 12 competency-based challenges.
</p>

<div style="text-align:center;margin-top:30px;">
<button class="btn" onclick="startQuiz()">
Start Challenge
</button>
</div>

</div>

<div id="quizScreen" class="card hidden">

<div class="topBar">

<div class="questionBox">
Question <span id="qNo">1</span>/12
</div>

<div class="scoreBox">
Score: <span id="score">0</span>
</div>

<div class="timerBox">
⏳ <span id="timer">45</span>s
</div>

<button id="muteBtn" class="audioBtn">
🔊 Sound On
</button>

</div>

<img id="questionImage" class="questionImage hidden">

<div id="questionText" class="question"></div>

<div id="optionsContainer" class="options"></div>

<div id="hintBox" class="hintBox"></div>

<div id="feedback" class="feedback"></div>

<div style="text-align:center;margin-top:20px;">
<button id="nextBtn" class="btn hidden">
Next Question
</button>
</div>

</div>

<div id="resultScreen" class="card hidden">

<h1>Quiz Completed!</h1>

<h2 id="finalScore"></h2>

<p id="resultMessage"
style="text-align:center;margin-top:20px;font-size:1.1rem;">
</p>

<div style="text-align:center;margin-top:25px;">
<button class="btn" onclick="location.reload()">
Play Again
</button>
</div>

</div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

const questions = [
{
question:"During a nature walk, students observe a cactus growing in dry soil with very little water available. Which habitat is most suitable for this plant?",
options:[
"Rainforest",
"Desert",
"Pond",
"Polar region"
],
answer:1,
hint:"Think about areas with very little rainfall.",
explanation:"Cacti are adapted to hot, dry desert habitats."
},

{
question:"A camel from the Thar Desert is moved to a dense rainforest. Which challenge is it most likely to face?",
options:[
"Lack of oxygen",
"Excess moisture and heat",
"Lack of food",
"Freezing temperatures"
],
answer:1,
hint:"Consider the conditions camels are adapted to.",
explanation:"Camels are adapted to dry environments, not humid rainforests."
},

{
question:"A student notices that one camel has one hump while another has two humps. Which conclusion is most reasonable?",
image:"assets/camel-adaptation.png",
options:[
"Both live in identical habitats",
"Different habitats can lead to different adaptations",
"Humps are used only for drinking water",
"One camel is younger than the other"
],
answer:1,
hint:"Think about Thar Desert and Ladakh.",
explanation:"Animals adapt differently to suit different environmental conditions."
},

{
question:"A wildlife reserve introduces zebras, lions, and giraffes into a habitat. Which habitat would best support all three animals?",
options:[
"Polar region",
"Desert",
"Grassland",
"Freshwater habitat"
],
answer:2,
hint:"Think about where large grazing animals are commonly found.",
explanation:"Grasslands provide food and space for herbivores and predators."
},

{
question:"A fish and a dolphin both live in water. Which statement best explains why they are classified differently?",
options:[
"Fish breathe through gills, while dolphins breathe through lungs",
"Fish are plants",
"Dolphins have scales",
"Fish do not need oxygen"
],
answer:0,
hint:"Think about how each animal breathes.",
explanation:"Fish use gills while dolphins come to the surface to breathe air."
},

{
question:"A student observes three aquatic plants. Which plant is most likely to have stomata mainly on the upper surface of its leaves?",
image:"assets/aquatic-plants.png",
options:[
"Vallisneria",
"Lotus",
"Hydrilla",
"Seaweed"
],
answer:1,
hint:"Which plant has floating leaves?",
explanation:"Floating leaves require stomata on the upper surface for gas exchange."
},
{
question:"A forest loses most of its water sources due to a long drought. Which abiotic factor has changed?",
options:[
"Plants",
"Animals",
"Water",
"Fungi"
],
answer:2,
hint:"Abiotic factors are non-living.",
explanation:"Water is a non-living component of the environment."
},

{
question:"A grassland food chain is shown:\n\nGrass → Deer → Tiger\n\nIf the deer population decreases sharply, what is the most likely immediate effect?",
options:[
"Tigers may struggle to find food",
"Grass disappears instantly",
"Water level increases",
"Deer become producers"
],
answer:0,
hint:"Think about who eats the deer.",
explanation:"Tigers depend on deer as a food source."
},

{
question:"Assertion: Plants are considered producers.\n\nReason: Plants can prepare their own food using sunlight.",
options:[
"Both are correct and the reason explains the assertion",
"Both are correct but unrelated",
"Assertion is correct but reason is wrong",
"Both are wrong"
],
answer:0,
hint:"What is photosynthesis?",
explanation:"Plants make their own food and therefore act as producers."
},

{
question:"A new highway is built through a forest. Which effect is most likely?",
options:[
"Increased habitat fragmentation",
"More biodiversity immediately",
"More food for all animals",
"Increased rainfall"
],
answer:0,
hint:"Think about what happens when habitats are divided.",
explanation:"Roads often split habitats and disrupt animal movement."
},

{
question:"The Great Indian Bustard population is declining because of habitat loss and collisions with power lines. Which action would best help conserve the species?",
options:[
"Construct more power lines",
"Protect grassland habitats and reduce collision risks",
"Increase urban development",
"Remove native vegetation"
],
answer:1,
hint:"Conservation focuses on reducing threats.",
explanation:"Protecting habitats and reducing human-caused risks helps species survive."
},

{
question:"A scientist studies an unknown ecosystem and records: Plenty of rainfall, dense tree cover, high biodiversity, and warm temperatures throughout the year. Which habitat is most likely being described?",
options:[
"Desert",
"Tundra",
"Rainforest",
"Polar habitat"
],
answer:2,
hint:"Consider all four clues together.",
explanation:"Rainforests are warm, receive heavy rainfall, and support high biodiversity."
}

];
let currentQuestion=0;
let score=0;
let retryUsed=false;
let timer;
let timeLeft=45;
let soundEnabled=true;

const introScreen=document.getElementById('introScreen');
const quizScreen=document.getElementById('quizScreen');
const resultScreen=document.getElementById('resultScreen');

const qNo=document.getElementById('qNo');
const scoreEl=document.getElementById('score');
const timerEl=document.getElementById('timer');

const questionText=document.getElementById('questionText');
const optionsContainer=document.getElementById('optionsContainer');
const feedback=document.getElementById('feedback');
const hintBox=document.getElementById('hintBox');
const questionImage=document.getElementById('questionImage');
const nextBtn=document.getElementById('nextBtn');

const correctSound=document.getElementById('correctSound');
const wrongSound=document.getElementById('wrongSound');
const clapSound=document.getElementById('clapSound');

setTimeout(()=>{
document.getElementById('logoScreen').style.display='none';
},5000);

document.getElementById('muteBtn').onclick=()=>{

soundEnabled=!soundEnabled;

document.getElementById('muteBtn').textContent=
soundEnabled ? "🔊 Sound On" : "🔇 Sound Off";

};

function playSound(audio){

if(soundEnabled){

audio.currentTime=0;
audio.play();

}

}

function shuffleQuestions(){

for(let i=questions.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[questions[i],questions[j]]=
[questions[j],questions[i]];

}

}

function startQuiz(){

shuffleQuestions();

introScreen.classList.add('hidden');
quizScreen.classList.remove('hidden');

loadQuestion();

}

function loadQuestion(){

clearInterval(timer);

timeLeft=45;
timerEl.textContent=timeLeft;

retryUsed=false;

feedback.innerHTML="";
feedback.style.display="none";

hintBox.innerHTML="";
hintBox.style.display="none";

nextBtn.classList.add('hidden');

const q=questions[currentQuestion];

qNo.textContent=currentQuestion+1;

questionText.textContent=q.question;

optionsContainer.innerHTML="";

if(q.image){

questionImage.src=q.image;
questionImage.style.display="block";
questionImage.classList.remove('hidden');

}else{

questionImage.removeAttribute("src");
questionImage.style.display="none";
questionImage.classList.add('hidden');

}

q.options.forEach((option,index)=>{

const btn=document.createElement('button');

btn.classList.add('optionBtn');
btn.textContent=option;

btn.onclick=()=>checkAnswer(index,btn);

optionsContainer.appendChild(btn);

});

startTimer();

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--;

timerEl.textContent=timeLeft;

if(timeLeft<=0){

clearInterval(timer);
showCorrectAnswer();

}

},1000);

}

function checkAnswer(selected,btn){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll('.optionBtn');

buttons.forEach(b=>b.disabled=true);

if(selected===q.answer){

btn.classList.add('correct');

score++;
scoreEl.textContent=score;

feedback.className=
"feedback correctFeedback";

feedback.style.display="block";

feedback.innerHTML=
"✅ Correct!<br><br>"+q.explanation;

playSound(correctSound);

createConfetti();

clearInterval(timer);

showNextButton();

}else{

btn.classList.add('wrong');

playSound(wrongSound);

showCross();

if(!retryUsed){

retryUsed=true;

hintBox.style.display="block";

hintBox.innerHTML=
"💡 Hint: "+q.hint;

buttons.forEach((b,index)=>{

if(index!==selected){

b.disabled=false;

}

});

}else{

buttons[q.answer].classList.add('correct');

feedback.className=
"feedback wrongFeedback";

feedback.style.display="block";

feedback.innerHTML=
"❌ Correct Answer: <b>"
+q.options[q.answer]+
"</b><br><br>"
+q.explanation;

clearInterval(timer);

showNextButton();

}

}

}

function showCorrectAnswer(){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll('.optionBtn');

buttons.forEach(b=>b.disabled=true);

buttons[q.answer].classList.add('correct');

feedback.className=
"feedback wrongFeedback";

feedback.style.display="block";

feedback.innerHTML=
"⏰ Time Up!<br><br>Correct Answer: <b>"
+q.options[q.answer]+
"</b><br><br>"
+q.explanation;

showNextButton();

}

function showNextButton(){

nextBtn.classList.remove('hidden');

if(currentQuestion===questions.length-1){

nextBtn.textContent="Submit Quiz";

}else{

nextBtn.textContent="Next Question";

}

nextBtn.onclick=()=>{

currentQuestion++;

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResults();

}

};

}
function showResults(){

quizScreen.classList.add('hidden');

resultScreen.classList.remove('hidden');

const percentage=Math.round(
(score/questions.length)*100
);

let message="";

if(percentage>=75){

message="🌍 Excellent! You have a strong understanding of habitats, adaptations, food chains and conservation.";

}else if(percentage>=40){

message="🌿 Good effort! Review the chapter and try again.";

}else{

message="🐾 Keep exploring nature! A little more revision will help strengthen your understanding.";

}

document.getElementById('finalScore').innerHTML=
`Your Score: ${score} / ${questions.length}<br><br>
Percentage: ${percentage}%`;

document.getElementById('resultMessage').innerHTML=
message;

playSound(clapSound);

}

function createConfetti(){

for(let i=0;i<25;i++){

const piece=document.createElement('div');

piece.classList.add('confetti');

piece.style.left=
Math.random()*100+'vw';

piece.style.background=
[
'#42a5f5',
'#66bb6a',
'#26c6da',
'#29b6f6'
][Math.floor(Math.random()*4)];

document.body.appendChild(piece);

setTimeout(()=>{

piece.remove();

},2500);

}

}

function showCross(){

const cross=document.createElement('div');

cross.classList.add('cross');

cross.innerHTML='✖';

document.body.appendChild(cross);

setTimeout(()=>{

cross.remove();

},1000);

}

</script>

</body>
</html>
