<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Air Around Us</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
background:linear-gradient(
180deg,
#dbeafe 0%,
#e0f2fe 35%,
#f0fdf4 70%,
#ffffff 100%
);
position:relative;
}

/* Improved Atmospheric Theme */

.sky{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:-2;
}

.cloud{
position:absolute;
font-size:60px;
opacity:0.15;
animation:drift 40s linear infinite;
}

.cloud:nth-child(1){
top:8%;
left:-10%;
animation-duration:40s;
}

.cloud:nth-child(2){
top:22%;
left:-15%;
animation-duration:55s;
}

.cloud:nth-child(3){
top:40%;
left:-12%;
animation-duration:48s;
}

@keyframes drift{
from{
transform:translateX(0);
}
to{
transform:translateX(130vw);
}
}

.floating{
position:fixed;
font-size:42px;
opacity:0.12;
pointer-events:none;
z-index:-1;
animation:float 18s ease-in-out infinite;
}

.wind1{
top:15%;
left:5%;
}

.wind2{
top:60%;
right:8%;
animation-delay:3s;
}

.factory{
bottom:70px;
left:5%;
}

.vehicle{
bottom:120px;
right:8%;
}

.tree1{
bottom:80px;
left:30%;
}

.tree2{
bottom:90px;
right:30%;
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-20px);
}

100%{
transform:translateY(0px);
}

}

.ground{
position:fixed;
bottom:0;
left:0;
width:100%;
height:120px;
background:
linear-gradient(
to top,
rgba(34,197,94,0.15),
transparent
);
z-index:-2;
}

/* Logo */

#logoScreen{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#logoScreen img{
width:180px;
animation:logoPop 1s ease;
}

@keyframes logoPop{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

/* Main Layout */

.container{
max-width:950px;
margin:25px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.92);
backdrop-filter:blur(6px);
padding:25px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
text-align:center;
font-size:2.3rem;
color:#0f4c81;
}

h2{
text-align:center;
margin-top:15px;
color:#333;
}

.btn{
background:#1565c0;
color:white;
border:none;
padding:14px 28px;
border-radius:12px;
cursor:pointer;
font-size:1rem;
transition:.3s;
}

.btn:hover{
background:#0d47a1;
}

.hidden{
display:none;
}

.topBar{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.questionBox,
.scoreBox,
.timerBox{
background:#e3f2fd;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
color:#0d47a1;
}

.audioBtn{
background:#555;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

.question{
font-size:1.15rem;
line-height:1.7;
margin-bottom:20px;
}

.questionImage{
width:100%;
max-height:380px;
object-fit:contain;
background:white;
border:2px solid #bbdefb;
border-radius:16px;
padding:10px;
margin-bottom:20px;
}

.options{
display:grid;
gap:12px;
}

.optionBtn{
padding:14px;
border:none;
border-radius:12px;
background:#f8fafc;
cursor:pointer;
font-size:1rem;
text-align:left;
transition:.3s;
}

.optionBtn:hover{
background:#dbeafe;
}

.correct{
background:#d4f7d9 !important;
border:2px solid green;
}

.wrong{
background:#ffd9d9 !important;
border:2px solid red;
}

.feedback{
display:none;
padding:15px;
margin-top:15px;
border-radius:12px;
line-height:1.6;
font-weight:bold;
}

.correctFeedback{
background:#d4f7d9;
}

.wrongFeedback{
background:#ffd9d9;
}

.hintBox{
display:none;
margin-top:15px;
padding:14px;
background:#fff8d6;
border-left:5px solid orange;
border-radius:10px;
font-weight:bold;
}

@media(max-width:600px){

.question{
font-size:1rem;
}

.optionBtn{
font-size:.95rem;
}

}

</style>

</head>

<body>

<div class="sky">
<div class="cloud">☁️</div>
<div class="cloud">☁️</div>
<div class="cloud">☁️</div>
</div>

<div class="floating wind1">🌬️</div>
<div class="floating wind2">🫧</div>
<div class="floating factory">🏭</div>
<div class="floating vehicle">🚗</div>
<div class="floating tree1">🌳</div>
<div class="floating tree2">🌳</div>

<div class="ground"></div>

<div id="logoScreen">
<img src="assets/innovine-logo.png">
</div>

<div class="container">

<div id="introScreen" class="card">

<h1>Air Around Us</h1>

<h2>Grade 6 Science</h2>

<p style="margin-top:25px;text-align:center;line-height:1.7;">
Explore the composition of air,
air pressure, pollution,
the ozone layer and environmental balance
through 12 competency-based challenges.
</p>

<div style="text-align:center;margin-top:30px;">
<button class="btn" onclick="startQuiz()">
Start Challenge
</button>
</div>

</div>

<div id="quizScreen" class="card hidden">

<div class="topBar">

<div class="questionBox">
Question <span id="qNo">1</span>/12
</div>

<div class="scoreBox">
Score: <span id="score">0</span>
</div>

<div class="timerBox">
⏳ <span id="timer">45</span>s
</div>

<button id="muteBtn" class="audioBtn">
🔊 Sound On
</button>

</div>

<img id="questionImage" class="questionImage hidden">

<div id="questionText" class="question"></div>

<div id="optionsContainer" class="options"></div>

<div id="hintBox" class="hintBox"></div>

<div id="feedback" class="feedback"></div>

<div style="text-align:center;margin-top:20px;">
<button id="nextBtn" class="btn hidden">
Next Question
</button>
</div>

</div>

<div id="resultScreen" class="card hidden">

<h1>Quiz Completed!</h1>

<h2 id="finalScore"></h2>

<p id="resultMessage"
style="text-align:center;margin-top:20px;font-size:1.1rem;">
</p>

<div style="text-align:center;margin-top:25px;">
<button class="btn" onclick="location.reload()">
Play Again
</button>
</div>

</div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

const questions = [
{
question:"Riya weighs an empty balloon and then weighs the same balloon after inflating it. She notices that the inflated balloon weighs slightly more. What conclusion is best supported?",
options:[
"Air has mass.",
"Air is colourless.",
"Air contains oxygen.",
"Air occupies no space."
],
answer:0,
hint:"What changed after air was added?",
explanation:"The increase in weight shows that air has mass."
},

{
question:"A student pushes an upside-down tumbler into a bowl of water. Water does not immediately enter the tumbler. Why?",
options:[
"Water is heavier than air.",
"Air inside the tumbler occupies space.",
"The tumbler is waterproof.",
"Water avoids glass surfaces."
],
answer:1,
hint:"Think about what is already inside the tumbler.",
explanation:"The air inside occupies space and prevents water from entering."
},

{
question:"A scientist creates an artificial atmosphere containing only oxygen. Which problem is most likely to occur?",
options:[
"Plants stop photosynthesis.",
"Burning becomes difficult.",
"Burning becomes dangerously rapid.",
"Air pressure disappears."
],
answer:2,
hint:"Oxygen supports combustion.",
explanation:"Too much oxygen would cause substances to burn more easily and rapidly."
},

{
question:"Farmers know that nitrogen is important for plant growth. Which statement best explains why?",
options:[
"Nitrogen helps make proteins in living organisms.",
"Nitrogen causes rainfall.",
"Nitrogen produces sunlight.",
"Nitrogen destroys bacteria."
],
answer:0,
hint:"Think about proteins and growth.",
explanation:"Nitrogen is an essential component of proteins needed for growth."
},

{
question:"A student observes the chart showing 78% nitrogen and 21% oxygen. Which conclusion is correct?",
image:"assets/composition-of-air.png",
options:[
"Oxygen is the largest component of air.",
"Nitrogen forms the largest portion of air.",
"Carbon dioxide forms 21%.",
"Water vapour forms 78%."
],
answer:1,
hint:"Compare the largest section of the chart.",
explanation:"Nitrogen makes up about 78% of air."
},

{
question:"A balloon bursts when too much air is pumped into it. What is the best explanation?",
options:[
"Air inside becomes heavier than water.",
"Air pressure inside exceeds the balloon's capacity.",
"Oxygen escapes.",
"Nitrogen disappears."
],
answer:1,
hint:"Think about pressure on the balloon walls.",
explanation:"Excess air increases pressure until the balloon bursts."
},
{
question:"Scientists observe that the ozone layer has become thinner in some regions. Which consequence is most likely?",
options:[
"Less sunlight reaches Earth.",
"More harmful UV radiation reaches Earth.",
"More oxygen is produced.",
"More rainfall occurs."
],
answer:1,
hint:"Ozone acts like a protective shield.",
explanation:"Ozone absorbs harmful ultraviolet radiation."
},

{
question:"A city plants thousands of trees but also increases the number of vehicles on its roads. Which factor is most likely to increase air pollution?",
options:[
"Tree plantation",
"Vehicle emissions",
"Soil erosion",
"Cloud formation"
],
answer:1,
hint:"Think about pollutants released into the air.",
explanation:"Vehicles release harmful gases and particulate matter."
},

{
question:"A student studies the image and identifies one activity that reduces the air's natural ability to remove carbon dioxide. Which activity is it?",
image:"assets/causes-of-air-pollution.png",
options:[
"Vehicle use",
"Factory emissions",
"Deforestation",
"Road construction"
],
answer:2,
hint:"Which activity removes plants?",
explanation:"Trees absorb carbon dioxide. Cutting them reduces this natural process."
},

{
question:"During winter, a city experiences severe smog. Which effect is most likely to occur first?",
options:[
"Improved visibility",
"Increased road accidents",
"Faster plant growth",
"Lower air pollution"
],
answer:1,
hint:"Think about visibility on roads.",
explanation:"Smog reduces visibility and increases accident risk."
},

{
question:"A village cuts down most of its trees. Which change is most likely over time?",
options:[
"Oxygen production decreases.",
"Nitrogen disappears.",
"Air pressure increases sharply.",
"Water vapour stops forming."
],
answer:0,
hint:"What role do plants play in photosynthesis?",
explanation:"Trees produce oxygen and absorb carbon dioxide."
},

{
question:"A town records the following changes over ten years: More vehicles, fewer trees, increased smoke from industries, and rising respiratory illnesses. Which conclusion is best supported by all the evidence?",
options:[
"Air quality has improved.",
"Air pollution has increased significantly.",
"Oxygen levels have doubled.",
"Nitrogen has disappeared from the atmosphere."
],
answer:1,
hint:"Look for a common link between all four observations.",
explanation:"Vehicle emissions, industrial smoke, and deforestation all contribute to worsening air pollution and health problems."
}

];
let currentQuestion=0;
let score=0;
let retryUsed=false;
let timer;
let timeLeft=45;
let soundEnabled=true;

const introScreen=document.getElementById('introScreen');
const quizScreen=document.getElementById('quizScreen');
const resultScreen=document.getElementById('resultScreen');

const qNo=document.getElementById('qNo');
const scoreEl=document.getElementById('score');
const timerEl=document.getElementById('timer');

const questionText=document.getElementById('questionText');
const optionsContainer=document.getElementById('optionsContainer');
const feedback=document.getElementById('feedback');
const hintBox=document.getElementById('hintBox');
const questionImage=document.getElementById('questionImage');
const nextBtn=document.getElementById('nextBtn');

const correctSound=document.getElementById('correctSound');
const wrongSound=document.getElementById('wrongSound');
const clapSound=document.getElementById('clapSound');

setTimeout(()=>{
document.getElementById('logoScreen').style.display='none';
},5000);

document.getElementById('muteBtn').onclick=()=>{

soundEnabled=!soundEnabled;

document.getElementById('muteBtn').textContent=
soundEnabled ? "🔊 Sound On" : "🔇 Sound Off";

};

function playSound(audio){

if(soundEnabled){

audio.currentTime=0;
audio.play();

}

}

function shuffleQuestions(){

for(let i=questions.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[questions[i],questions[j]]=
[questions[j],questions[i]];

}

}

function startQuiz(){

shuffleQuestions();

introScreen.classList.add('hidden');
quizScreen.classList.remove('hidden');

loadQuestion();

}

function loadQuestion(){

clearInterval(timer);

timeLeft=45;
timerEl.textContent=timeLeft;

retryUsed=false;

feedback.innerHTML="";
feedback.style.display="none";

hintBox.innerHTML="";
hintBox.style.display="none";

nextBtn.classList.add('hidden');

const q=questions[currentQuestion];

qNo.textContent=currentQuestion+1;

questionText.textContent=q.question;

optionsContainer.innerHTML="";

if(q.image){

questionImage.src=q.image;
questionImage.style.display="block";
questionImage.classList.remove('hidden');

}else{

questionImage.removeAttribute("src");
questionImage.style.display="none";
questionImage.classList.add('hidden');

}

q.options.forEach((option,index)=>{

const btn=document.createElement('button');

btn.classList.add('optionBtn');
btn.textContent=option;

btn.onclick=()=>checkAnswer(index,btn);

optionsContainer.appendChild(btn);

});

startTimer();

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--;

timerEl.textContent=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

showCorrectAnswer();

}

},1000);

}

function checkAnswer(selected,btn){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll('.optionBtn');

buttons.forEach(b=>b.disabled=true);

if(selected===q.answer){

btn.classList.add('correct');

score++;

scoreEl.textContent=score;

feedback.className=
"feedback correctFeedback";

feedback.style.display="block";

feedback.innerHTML=
"✅ Correct!<br><br>"+q.explanation;

playSound(correctSound);

createConfetti();

clearInterval(timer);

showNextButton();

}else{

btn.classList.add('wrong');

playSound(wrongSound);

showCross();

if(!retryUsed){

retryUsed=true;

hintBox.style.display="block";

hintBox.innerHTML=
"💡 Hint: "+q.hint;

buttons.forEach((b,index)=>{

if(index!==selected){

b.disabled=false;

}

});

}else{

buttons[q.answer].classList.add('correct');

feedback.className=
"feedback wrongFeedback";

feedback.style.display="block";

feedback.innerHTML=
"❌ Correct Answer: <b>"
+q.options[q.answer]+
"</b><br><br>"
+q.explanation;

clearInterval(timer);

showNextButton();

}

}

}

function showCorrectAnswer(){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll('.optionBtn');

buttons.forEach(b=>b.disabled=true);

buttons[q.answer].classList.add('correct');

feedback.className=
"feedback wrongFeedback";

feedback.style.display="block";

feedback.innerHTML=
"⏰ Time Up!<br><br>Correct Answer: <b>"
+q.options[q.answer]+
"</b><br><br>"
+q.explanation;

showNextButton();

}

function showNextButton(){

nextBtn.classList.remove('hidden');

if(currentQuestion===questions.length-1){

nextBtn.textContent="Submit Quiz";

}else{

nextBtn.textContent="Next Question";

}

nextBtn.onclick=()=>{

currentQuestion++;

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResults();

}

};

}
function showResults(){

quizScreen.classList.add('hidden');

resultScreen.classList.remove('hidden');

const percentage=Math.round(
(score/questions.length)*100
);

let message="";

if(percentage>=75){

message="🌬️ Excellent! You have a strong understanding of air, atmosphere, pollution and environmental balance.";

}else if(percentage>=40){

message="☁️ Good effort! Review the chapter and try again.";

}else{

message="🌎 Keep learning! A little more revision will strengthen your understanding of air and its importance.";

}

document.getElementById('finalScore').innerHTML=
`Your Score: ${score} / ${questions.length}<br><br>
Percentage: ${percentage}%`;

document.getElementById('resultMessage').innerHTML=
message;

playSound(clapSound);

}

function createConfetti(){

for(let i=0;i<25;i++){

const piece=document.createElement('div');

piece.classList.add('confetti');

piece.style.left=
Math.random()*100+'vw';

piece.style.background=
[
'#60a5fa',
'#38bdf8',
'#22c55e',
'#06b6d4'
][Math.floor(Math.random()*4)];

document.body.appendChild(piece);

setTimeout(()=>{

piece.remove();

},2500);

}

}

function showCross(){

const cross=document.createElement('div');

cross.classList.add('cross');

cross.innerHTML='✖';

document.body.appendChild(cross);

setTimeout(()=>{

cross.remove();

},1000);

}

</script>

</body>
</html>
