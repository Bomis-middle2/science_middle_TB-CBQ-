<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grade 6 Science - Food and Health</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(
135deg,
#07111f,
#0d1b2a,
#102a43,
#0f172a
);
min-height:100vh;
overflow-x:hidden;
color:#222;
}

/* BIOLOGY BACKGROUND */

.bio-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;
z-index:0;
}

.bio-icon{
position:absolute;
font-size:42px;
opacity:0.06;
animation:floatUp linear infinite;
}

.bio-icon:nth-child(1){
left:10%;
animation-duration:25s;
}

.bio-icon:nth-child(2){
left:25%;
animation-duration:30s;
}

.bio-icon:nth-child(3){
left:40%;
animation-duration:22s;
}

.bio-icon:nth-child(4){
left:60%;
animation-duration:34s;
}

.bio-icon:nth-child(5){
left:80%;
animation-duration:28s;
}

.bio-icon:nth-child(6){
left:92%;
animation-duration:36s;
}

@keyframes floatUp{

from{
transform:translateY(120vh) rotate(0deg);
}

to{
transform:translateY(-120vh) rotate(360deg);
}

}

/* SPLASH */

#splash{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:#07111f;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:9999;

}

#splash img{

width:180px;
max-width:80%;

}

#splash h2{

margin-top:15px;
color:white;

}

/* MAIN */

.container{

position:relative;
z-index:2;

max-width:900px;
margin:auto;

padding:20px;

}

.card{

background:rgba(255,255,255,.97);

padding:25px;

border-radius:18px;

box-shadow:0 5px 20px rgba(0,0,0,.2);

}

.hidden{
display:none;
}

h1{

text-align:center;
margin-bottom:15px;
color:#0d47a1;

}

.intro-text{

line-height:1.7;
font-size:18px;
text-align:center;

}

.btn{

width:100%;

padding:15px;

margin-top:15px;

border:none;
border-radius:12px;

cursor:pointer;

font-size:17px;
font-weight:bold;

background:#0d47a1;
color:white;

}

.btn:hover{

background:#1565c0;

}

/* TOP BAR */

.top-bar{

display:flex;
justify-content:space-between;

gap:10px;

margin-bottom:15px;

flex-wrap:wrap;

}

.score-box{

background:white;

padding:10px 14px;

border-radius:10px;

font-weight:bold;

box-shadow:0 2px 6px rgba(0,0,0,.15);

}

/* QUESTION */

#questionText{

font-size:22px;

line-height:1.5;

margin-bottom:15px;

}

.question-image{

width:100%;
max-width:450px;

display:block;

margin:15px auto;

border-radius:12px;

box-shadow:0 2px 8px rgba(0,0,0,.2);

}

.option{

width:100%;

padding:14px;

margin-bottom:12px;

border:none;

border-radius:12px;

background:#e8f0fe;

cursor:pointer;

font-size:16px;

text-align:left;

}

.option:hover{

background:#d2e3fc;

}

/* FEEDBACK */

#feedback{

display:none;

margin-top:15px;

padding:15px;

border-radius:12px;

}

.correct{

background:#e8f5e9;
color:#2e7d32;

}

.wrong{

background:#ffebee;
color:#c62828;

}

.cross{

font-size:60px;
text-align:center;

animation:shake .4s;

}

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}

}

/* CONFETTI */

.confetti{

position:fixed;

font-size:22px;

pointer-events:none;

animation:fall 2s linear forwards;

z-index:999;

}

@keyframes fall{

0%{
transform:translateY(-40px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}

}

/* RESULT */

#resultScreen{
display:none;
}

.result-score{

font-size:30px;

font-weight:bold;

text-align:center;

margin:20px 0;

}

.result-message{

font-size:22px;

text-align:center;

line-height:1.6;

}

.mute-btn{

background:#ff9800;

}

.final-badge{

background:#ff9800;
color:white;

padding:10px;

border-radius:10px;

margin-bottom:15px;

font-weight:bold;

text-align:center;

}

/* MOBILE */

@media(max-width:768px){

#questionText{
font-size:19px;
}

.option{

font-size:15px;

min-height:52px;

}

.btn{
min-height:54px;
}

}

</style>
</head>

<body>

<div class="bio-bg">

<div class="bio-icon">🧬</div>
<div class="bio-icon">🌿</div>
<div class="bio-icon">🔬</div>
<div class="bio-icon">🦠</div>
<div class="bio-icon">💧</div>
<div class="bio-icon">❤️</div>

</div>

<!-- SPLASH -->

<div id="splash">

<img src="assets/innovine-logo.png">

<h2>Innovine Learning</h2>

</div>

<div class="container">

<!-- INTRO -->

<div class="card" id="introScreen">

<h1>Food and Health</h1>

<div class="intro-text">

<h2 style="font-size:32px;margin-bottom:15px;">
Grade 6 Science
</h2>

<h1 style="font-size:52px;">
Food and Health
</h1>

</div>
  
<button
class="btn"
onclick="startQuiz()">
Start Challenge
</button>

</div>

<!-- QUESTION SCREEN -->

<div
class="card hidden"
id="questionCard">

<div class="top-bar">

<div class="score-box">
Score:
<span id="score">0</span>
</div>

<div class="score-box">
Question:
<span id="qNumber">1</span>/12
</div>

<div class="score-box">
⏱
<span id="timer">45</span>s
</div>

</div>

<button
id="muteBtn"
class="btn mute-btn"
onclick="toggleAudio()">

🔊 Sound ON

</button>

<div
id="challengeBadge"
class="final-badge hidden">

🏆 FINAL CHALLENGE

</div>

<img
id="questionImage"
class="question-image hidden">

<h2 id="questionText"></h2>

<div id="optionsContainer"></div>

<div id="feedback"></div>

<button
id="nextBtn"
class="btn hidden"
onclick="nextQuestion()">

Next Question

</button>

</div>

<!-- RESULT -->

<div
class="card hidden"
id="resultScreen">

<h1>Quiz Complete!</h1>

<div
id="finalScore"
class="result-score">
</div>

<div
id="resultMessage"
class="result-message">
</div>

<button
class="btn"
onclick="location.reload()">

Try Again

</button>

</div>

</div>

<audio
id="correctSound"
src="assets/correct.mp3"
preload="auto"></audio>

<audio
id="wrongSound"
src="assets/wrong.mp3"
preload="auto"></audio>

<audio
id="clapSound"
src="assets/freesound_community-claps-44774.mp3"
preload="auto"></audio>

<script>

setTimeout(function(){

document.getElementById("splash").style.display="none";

},5000);

let score=0;
let currentQuestion=0;
let attempts=0;
let timer;
let timeLeft=45;
let audioEnabled=true;

let questions=[
{
question:"A family from Karnataka is preparing a traditional breakfast. Which food combination is most likely to be served?",
options:[
"Dal Baati and Bajra Roti",
"Idli, Dosa and Coconut Chutney",
"Sael Roti and Gundruk",
"Makki ki Roti and Sarson ka Saag"
],
answer:1,
hint:"Think about foods commonly prepared using rice and coconut.",
explanation:"Karnataka commonly uses rice-based foods such as idli and dosa along with coconut chutney."
},

{
question:"A student lists the following foods: Carrot, Egg, Spinach and Fish. Which pair comes from animal sources?",
options:[
"Carrot and Spinach",
"Egg and Fish",
"Fish and Carrot",
"Spinach and Egg"
],
answer:1,
hint:"Animal-source foods come directly from animals.",
explanation:"Eggs and fish are obtained from animals."
},

{
question:"Rohan participates in a long football match. Which nutrient provides most of the immediate energy needed during the game?",
options:[
"Proteins",
"Vitamins",
"Carbohydrates",
"Minerals"
],
answer:2,
hint:"This nutrient is the body's main source of quick energy.",
explanation:"Carbohydrates provide immediate energy for physical activities."
},

{
question:"A student says, 'Proteins mainly help us see clearly in dim light.' What is wrong with this statement?",
options:[
"Proteins help digestion only",
"Proteins help growth and repair, not vision",
"Proteins provide no benefit",
"Proteins are found only in fruits"
],
answer:1,
hint:"Which nutrient is known as a body-building nutrient?",
explanation:"Proteins help growth and repair of body tissues."
},

{
question:"A food sample turns bluish-black when iodine solution is added. What does this indicate?",
options:[
"Protein is present",
"Fat is present",
"Starch is present",
"Sugar is present"
],
answer:2,
hint:"Iodine is used to test one type of carbohydrate.",
explanation:"A bluish-black colour confirms the presence of starch."
},

{
question:"Look at the image carefully. Which nutrient is mainly represented by these foods?",
image:"assets/carbohydrate.png",
options:[
"Vitamins",
"Proteins",
"Carbohydrates",
"Minerals"
],
answer:2,
hint:"These foods are major energy-giving foods.",
explanation:"Bread, grains, potato and banana are rich sources of carbohydrates."
},

{
question:"A crow feeds on grains, insects and leftover food. Based on its food habits, it is best classified as:",
options:[
"Herbivore",
"Carnivore",
"Omnivore",
"Parasite"
],
answer:2,
hint:"Does it eat only plants, only animals, or both?",
explanation:"Omnivores eat both plant and animal-based food."
},

{
question:"Assertion: Roughage does not provide nutrients. Reason: Roughage helps food move through the digestive system.",
options:[
"Both are correct and reason explains assertion",
"Both are correct but reason does not explain assertion",
"Assertion is correct but reason is wrong",
"Both are wrong"
],
answer:0,
hint:"Think about the role of dietary fibre.",
explanation:"Roughage does not provide nutrients but helps digestion."
},

{
question:"A child has difficulty seeing in dim light. Which deficiency is most likely responsible?",
options:[
"Iron deficiency",
"Vitamin A deficiency",
"Calcium deficiency",
"Protein deficiency"
],
answer:1,
hint:"This vitamin is important for healthy eyesight.",
explanation:"Vitamin A deficiency can cause night blindness."
},

{
question:"Look at the chart carefully. Which group helps return nutrients to the soil by breaking down dead plants and animals?",
image:"assets/animals_food_habits_under40kb.png",
options:[
"Herbivores",
"Omnivores",
"Scavengers",
"Decomposers"
],
answer:3,
hint:"Think about fungi and earthworms.",
explanation:"Decomposers recycle nutrients back into the ecosystem."
},

{
question:"FINAL CHALLENGE: A school health survey found: Student A eats chips daily, Student B eats fruits and vegetables daily, Student C drinks milk and eats pulses regularly, Student D follows a balanced diet. Who is most likely to maintain good long-term health?",
options:[
"Student A",
"Student B",
"Student C",
"Student D"
],
answer:3,
hint:"Think about the meaning of a balanced diet.",
explanation:"A balanced diet contains all nutrients in the correct amounts."
},

{
question:"FINAL CHALLENGE: A village health worker notices poor growth, weak muscles and swollen bellies among children. Which action would help most?",
options:[
"Increase sugary foods",
"Increase protein-rich foods",
"Increase salt intake",
"Reduce water intake"
],
answer:1,
hint:"Which nutrient helps build and repair body tissues?",
explanation:"These symptoms are commonly linked to protein deficiency."
}

];
function startQuiz(){

document.getElementById("introScreen").style.display="none";

document.getElementById("questionCard").classList.remove("hidden");

loadQuestion();

}

function loadQuestion(){

attempts=0;

let q=questions[currentQuestion];

document.getElementById("qNumber").textContent=currentQuestion+1;

document.getElementById("questionText").innerHTML=q.question;

document.getElementById("feedback").style.display="none";

document.getElementById("nextBtn").classList.add("hidden");

if(currentQuestion>=10){

document.getElementById("challengeBadge")
.classList.remove("hidden");

}else{

document.getElementById("challengeBadge")
.classList.add("hidden");

}

const image=
document.getElementById("questionImage");

if(q.image){

image.src=q.image;

image.classList.remove("hidden");

}else{

image.classList.add("hidden");

}

const optionsContainer=
document.getElementById("optionsContainer");

optionsContainer.innerHTML="";

q.options.forEach(function(option,index){

const btn=document.createElement("button");

btn.className="option";

btn.innerHTML=option;

btn.onclick=function(){

checkAnswer(index);

};

optionsContainer.appendChild(btn);

});

startTimer();

}

function startTimer(){

clearInterval(timer);

timeLeft=45;

document.getElementById("timer").textContent=timeLeft;

timer=setInterval(function(){

timeLeft--;

document.getElementById("timer").textContent=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

showTimeUp();

}

},1000);

}

function showTimeUp(){

let q=questions[currentQuestion];

document.getElementById("feedback").className="wrong";

document.getElementById("feedback").style.display="block";

document.getElementById("feedback").innerHTML=
"<b>⏰ Time Up!</b><br><br>" +
"<b>Correct Answer:</b><br>" +
q.options[q.answer] +
"<br><br>" +
"<b>Explanation:</b><br>" +
q.explanation;

document.getElementById("nextBtn")
.classList.remove("hidden");

}

function checkAnswer(selected){

let q=questions[currentQuestion];

if(selected===q.answer){

handleCorrect();

}else{

handleWrong();

}

}

function handleCorrect(){

clearInterval(timer);

score++;

document.getElementById("score").textContent=score;

if(audioEnabled){

document.getElementById("correctSound").play();

}

showConfetti();

document.getElementById("feedback").className="correct";

document.getElementById("feedback").style.display="block";

document.getElementById("feedback").innerHTML=
"<b>⭐ Correct Answer!</b>";

document.getElementById("nextBtn")
.classList.remove("hidden");

}

function handleWrong(){

attempts++;

if(audioEnabled){

document.getElementById("wrongSound").play();

}

let q=questions[currentQuestion];

if(attempts===1){

document.getElementById("feedback").className="wrong";

document.getElementById("feedback").style.display="block";

document.getElementById("feedback").innerHTML=
"<div class='cross'>❌</div>" +
"<b>Hint:</b><br>" +
q.hint;

return;

}

clearInterval(timer);

document.getElementById("feedback").className="wrong";

document.getElementById("feedback").style.display="block";

document.getElementById("feedback").innerHTML=
"<div class='cross'>❌</div>" +
"<b>Correct Answer:</b><br>" +
q.options[q.answer] +
"<br><br>" +
"<b>Explanation:</b><br>" +
q.explanation;

document.getElementById("nextBtn")
.classList.remove("hidden");

}

function showConfetti(){

let stars=["⭐","🌟","✨"];

for(let i=0;i<25;i++){

let star=document.createElement("div");

star.className="confetti";

star.innerHTML=
stars[Math.floor(Math.random()*stars.length)];

star.style.left=Math.random()*100+"vw";

star.style.top="-20px";

star.style.fontSize=
(16+Math.random()*20)+"px";

document.body.appendChild(star);

setTimeout(function(){

star.remove();

},2000);

}

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion>=questions.length){

showResults();

return;

}

loadQuestion();

}

function showResults(){

clearInterval(timer);

document.getElementById("questionCard")
.classList.add("hidden");

document.getElementById("resultScreen")
.classList.remove("hidden");

if(audioEnabled){

document.getElementById("clapSound").play();

}

let percentage=
Math.round((score/questions.length)*100);

document.getElementById("finalScore").innerHTML=
score +
" / " +
questions.length +
"<br>(" +
percentage +
"%)";

let message="";

if(percentage>=75){

message=
"🌟 Excellent Work!<br><br>" +
"You have a strong understanding of Food and Health.";

}
else if(percentage>=40){

message=
"👍 Good Effort!<br><br>" +
"Review the chapter and try again.";

}
else{

message=
"📘 Keep Practising!<br><br>" +
"Revise the chapter and attempt the challenge again.";

}

document.getElementById("resultMessage")
.innerHTML=message;

}

function toggleAudio(){

audioEnabled=!audioEnabled;

let audios=
document.querySelectorAll("audio");

audios.forEach(function(audio){

audio.muted=!audioEnabled;

});

document.getElementById("muteBtn").innerHTML=
audioEnabled
?
"🔊 Sound ON"
:
"🔇 Sound OFF";

}

</script>

</body>
</html>
