<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Water - An Essential Resource</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
background:linear-gradient(
180deg,
#dbeafe 0%,
#e0f7ff 35%,
#f0fdff 70%,
#ffffff 100%
);
position:relative;
}

/* WATER THEME BACKGROUND */

.sky{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:-3;
}

.cloud{
position:absolute;
font-size:65px;
opacity:0.18;
animation:cloudMove linear infinite;
}

.cloud1{
top:6%;
left:-10%;
animation-duration:45s;
}

.cloud2{
top:18%;
left:-20%;
animation-duration:60s;
}

.cloud3{
top:32%;
left:-15%;
animation-duration:52s;
}

@keyframes cloudMove{

from{
transform:translateX(0);
}

to{
transform:translateX(130vw);
}

}

/* Floating Water Icons */

.floating{
position:fixed;
opacity:0.12;
font-size:42px;
pointer-events:none;
z-index:-2;
animation:float 18s ease-in-out infinite;
}

.drop1{
top:15%;
left:8%;
}

.drop2{
top:40%;
right:10%;
animation-delay:2s;
}

.drop3{
bottom:25%;
left:12%;
animation-delay:5s;
}

.tap{
top:60%;
right:15%;
animation-delay:4s;
}

.house{
bottom:18%;
left:35%;
animation-delay:3s;
}

.waveIcon{
bottom:20%;
right:35%;
animation-delay:1s;
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-25px);
}

100%{
transform:translateY(0px);
}

}

/* River Effect */

.river{
position:fixed;
bottom:0;
left:0;
width:100%;
height:130px;
background:
linear-gradient(
to top,
rgba(14,165,233,0.22),
rgba(56,189,248,0.10),
transparent
);
z-index:-3;
}

/* Logo Screen */

#logoScreen{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#logoScreen img{
width:180px;
animation:logoPop 1s ease;
}

@keyframes logoPop{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

/* Layout */

.container{
max-width:950px;
margin:25px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.90);
backdrop-filter:blur(8px);
padding:25px;
border-radius:24px;
box-shadow:0 12px 30px rgba(0,0,0,.12);
}

h1{
text-align:center;
color:#0f4c81;
font-size:2.3rem;
}

h2{
text-align:center;
margin-top:15px;
color:#333;
}

.btn{
background:#1565c0;
color:white;
border:none;
padding:14px 28px;
border-radius:12px;
cursor:pointer;
font-size:1rem;
transition:.3s;
}

.btn:hover{
background:#0d47a1;
}

.hidden{
display:none;
}

.topBar{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.questionBox,
.scoreBox,
.timerBox{
background:#e0f2fe;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
color:#0d47a1;
}

.audioBtn{
background:#555;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

.question{
font-size:1.15rem;
line-height:1.7;
margin-bottom:20px;
color:#222;
}

.questionImage{
width:100%;
max-height:380px;
object-fit:contain;
background:white;
border:2px solid #93c5fd;
border-radius:16px;
padding:10px;
margin-bottom:20px;
}

.options{
display:grid;
gap:12px;
}

.optionBtn{
padding:14px;
border:none;
border-radius:12px;
background:#f8fafc;
cursor:pointer;
font-size:1rem;
text-align:left;
transition:.3s;
}

.optionBtn:hover{
background:#dbeafe;
}

.correct{
background:#d4f7d9 !important;
border:2px solid green;
}

.wrong{
background:#ffd9d9 !important;
border:2px solid red;
}

.feedback{
display:none;
padding:15px;
margin-top:15px;
border-radius:12px;
font-weight:bold;
line-height:1.6;
}

.correctFeedback{
background:#d4f7d9;
}

.wrongFeedback{
background:#ffd9d9;
}

.hintBox{
display:none;
margin-top:15px;
padding:14px;
background:#fff8d6;
border-left:5px solid orange;
border-radius:10px;
font-weight:bold;
}

.confetti{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
animation:fall 2s linear forwards;
z-index:999;
}

@keyframes fall{

0%{
transform:translateY(-20px);
opacity:1;
}

100%{
transform:translateY(100vh);
opacity:0;
}

}

.cross{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
color:red;
animation:fade 1s forwards;
z-index:999;
}

@keyframes fade{

0%{
opacity:1;
}

100%{
opacity:0;
}

}

@media(max-width:600px){

.question{
font-size:1rem;
}

.optionBtn{
font-size:.95rem;
}

}

</style>

</head>

<body>

<div class="sky">
<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>
<div class="cloud cloud3">☁️</div>
</div>

<div class="floating drop1">💧</div>
<div class="floating drop2">💧</div>
<div class="floating drop3">🌧️</div>
<div class="floating tap">🚰</div>
<div class="floating house">🏠</div>
<div class="floating waveIcon">🌊</div>

<div class="river"></div>

<div id="logoScreen">
<img src="assets/innovine-logo.png">
</div>

<div class="container">

<div id="introScreen" class="card">

<h1>Water – An Essential Resource</h1>

<h2>Grade 6 Science</h2>

<p style="margin-top:25px;text-align:center;line-height:1.7;">
Explore groundwater, water conservation,
rainwater harvesting, pollution,
the water cycle and flood preparedness
through 12 competency-based challenges.
</p>

<div style="text-align:center;margin-top:30px;">
<button class="btn" onclick="startQuiz()">
Start Challenge
</button>
</div>

</div>

<div id="quizScreen" class="card hidden">

<div class="topBar">

<div class="questionBox">
Question <span id="qNo">1</span>/12
</div>

<div class="scoreBox">
Score: <span id="score">0</span>
</div>

<div class="timerBox">
⏳ <span id="timer">45</span>s
</div>

<button id="muteBtn" class="audioBtn">
🔊 Sound On
</button>

</div>

<img id="questionImage" class="questionImage hidden">

<div id="questionText" class="question"></div>

<div id="optionsContainer" class="options"></div>

<div id="hintBox" class="hintBox"></div>

<div id="feedback" class="feedback"></div>

<div style="text-align:center;margin-top:20px;">
<button id="nextBtn" class="btn hidden">
Next Question
</button>
</div>

</div>

<div id="resultScreen" class="card hidden">

<h1>Quiz Completed!</h1>

<h2 id="finalScore"></h2>

<p id="resultMessage"
style="text-align:center;margin-top:20px;font-size:1.1rem;">
</p>

<div style="text-align:center;margin-top:25px;">
<button class="btn" onclick="location.reload()">
Play Again
</button>
</div>

</div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

const questions = [
{
question:"Riya's family receives a water bill showing unusually high water consumption. They discover that a tap in the garden has been leaking continuously for several weeks. What is the most likely impact of the leaking tap?",
options:[
"It increases groundwater recharge.",
"It causes unnecessary wastage of a valuable resource.",
"It improves water quality.",
"It prevents water pollution."
],
answer:1,
hint:"Think about what happens when clean water is allowed to flow continuously without use.",
explanation:"Even small leaks can waste large amounts of water over time. Conserving water is essential because only a small percentage of Earth's water is available for human use."
},

{
question:"Two villages receive similar rainfall. In Village A, most open land is covered with concrete. In Village B, large open fields allow rainwater to soak into the soil. Which village is likely to have higher groundwater levels?",
options:[
"Village A",
"Village B",
"Both villages equally",
"Cannot be determined"
],
answer:1,
hint:"Groundwater forms when rainwater enters the soil.",
explanation:"Open soil allows water to percolate and recharge groundwater. Concrete surfaces reduce water infiltration."
},

{
question:"A region experiences unusually high temperatures for several weeks. Which stage of the water cycle is most likely to increase first?",
options:[
"Condensation",
"Collection",
"Evaporation",
"Groundwater formation"
],
answer:2,
hint:"What happens when water is heated?",
explanation:"Higher temperatures increase the conversion of liquid water into water vapour, leading to faster evaporation."
},

{
question:"A cold bottle is taken out of a refrigerator and placed on a table. After a few minutes, water droplets appear on its outer surface. Where did these droplets come from?",
options:[
"Water leaked from inside the bottle.",
"Water vapour in the air condensed on the bottle.",
"The bottle produced water.",
"Ice inside the bottle melted through the walls."
],
answer:1,
hint:"Think about what happens when warm air touches a cold surface.",
explanation:"Water vapour in the surrounding air cools and condenses into liquid droplets on the bottle."
},

{
question:"A factory releases untreated waste into a nearby river. Which consequence is most likely?",
options:[
"Increase in aquatic biodiversity",
"Cleaner drinking water",
"Harm to aquatic organisms and water quality",
"Faster groundwater recharge"
],
answer:2,
hint:"Consider what harmful chemicals can do to living organisms.",
explanation:"Industrial waste can contaminate water and harm fish, plants, and people who depend on the river."
},

{
question:"The system shown in the image collects rainwater from rooftops and stores it for later use. What is the main purpose of this method?",
image:"assets/rainwater-harvesting.png",
options:[
"Increase air pollution",
"Recharge groundwater and conserve water",
"Remove oxygen from water",
"Increase evaporation"
],
answer:1,
hint:"Why would people store rainwater?",
explanation:"Rainwater harvesting reduces wastage and helps replenish groundwater supplies."
},
{
question:"After heavy flooding, many people in a village start drinking untreated water from stagnant pools. What is the greatest risk?",
options:[
"Increase in rainfall",
"Spread of waterborne diseases",
"Faster evaporation",
"Formation of groundwater"
],
answer:1,
hint:"Contaminated water often contains harmful microorganisms.",
explanation:"Floodwater can carry disease-causing bacteria and parasites, increasing health risks."
},

{
question:"A farmer uses large amounts of chemical fertilizers. After heavy rains, nearby ponds show dead fish floating on the surface. What is the most likely reason?",
options:[
"Fertilizers polluted the water body.",
"Fish stopped breathing naturally.",
"Rainwater became salty.",
"Groundwater disappeared."
],
answer:0,
hint:"Rainwater can carry substances from farms into water bodies.",
explanation:"Chemical runoff contaminates water and harms aquatic organisms."
},

{
question:"A town faces recurring water shortages every summer. Which measure would help most in the long term?",
options:[
"Leave taps running continuously",
"Build more fountains",
"Promote rainwater harvesting and water conservation",
"Wash roads daily with clean water"
],
answer:2,
hint:"Think about storing water when it is available.",
explanation:"Rainwater harvesting and conservation increase water availability during dry periods."
},

{
question:"The weather department predicts three days of continuous heavy rainfall in a town located near a river. Which action should be given the highest priority?",
options:[
"Encourage people to use more groundwater.",
"Move residents from low-lying areas to safer locations.",
"Increase fishing activities in the river.",
"Store more water in open containers near the river."
],
answer:1,
hint:"Think about what should be done before a flood occurs.",
explanation:"Relocating people from flood-prone areas reduces the risk to life during floods."
},

{
question:"A student points to the clouds in the diagram and says, 'This stage forms when water vapour cools.' Which stage is the student describing?",
image:"assets/water-cycle-clouds.png",
options:[
"Evaporation",
"Collection",
"Condensation",
"Transpiration"
],
answer:2,
hint:"Clouds form when water vapour changes into tiny droplets.",
explanation:"Condensation is the process in which water vapour cools and changes into liquid droplets."
},

{
question:"Residents living near a polluted river organize a community campaign. Which action would have the greatest positive impact?",
options:[
"Dump household waste only at night.",
"Increase the use of detergents.",
"Prevent waste discharge and support wastewater treatment.",
"Wash vehicles directly in the river."
],
answer:2,
hint:"Think about the root cause of river pollution.",
explanation:"Reducing waste discharge and treating wastewater helps restore water quality and protect aquatic life."
}

];
let currentQuestion=0;
let score=0;
let retryUsed=false;
let timer;
let timeLeft=45;
let soundEnabled=true;

const introScreen=document.getElementById('introScreen');
const quizScreen=document.getElementById('quizScreen');
const resultScreen=document.getElementById('resultScreen');

const qNo=document.getElementById('qNo');
const scoreEl=document.getElementById('score');
const timerEl=document.getElementById('timer');

const questionText=document.getElementById('questionText');
const optionsContainer=document.getElementById('optionsContainer');
const feedback=document.getElementById('feedback');
const hintBox=document.getElementById('hintBox');
const questionImage=document.getElementById('questionImage');
const nextBtn=document.getElementById('nextBtn');

const correctSound=document.getElementById('correctSound');
const wrongSound=document.getElementById('wrongSound');
const clapSound=document.getElementById('clapSound');

setTimeout(()=>{
document.getElementById('logoScreen').style.display='none';
},5000);

document.getElementById('muteBtn').onclick=()=>{

soundEnabled=!soundEnabled;

document.getElementById('muteBtn').textContent=
soundEnabled ? "🔊 Sound On" : "🔇 Sound Off";

};

function playSound(audio){

if(soundEnabled){

audio.currentTime=0;
audio.play();

}

}

function shuffleQuestions(){

for(let i=questions.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[questions[i],questions[j]]=
[questions[j],questions[i]];

}

}

function startQuiz(){

shuffleQuestions();

introScreen.classList.add('hidden');
quizScreen.classList.remove('hidden');

loadQuestion();

}

function loadQuestion(){

clearInterval(timer);

timeLeft=45;
timerEl.textContent=timeLeft;

retryUsed=false;

feedback.innerHTML="";
feedback.style.display="none";

hintBox.innerHTML="";
hintBox.style.display="none";

nextBtn.classList.add('hidden');

const q=questions[currentQuestion];

qNo.textContent=currentQuestion+1;

questionText.textContent=q.question;

optionsContainer.innerHTML="";

if(q.image){

questionImage.src=q.image;
questionImage.style.display="block";
questionImage.classList.remove('hidden');

}else{

questionImage.removeAttribute("src");
questionImage.style.display="none";
questionImage.classList.add('hidden');

}

q.options.forEach((option,index)=>{

const btn=document.createElement('button');

btn.classList.add('optionBtn');
btn.textContent=option;

btn.onclick=()=>checkAnswer(index,btn);

optionsContainer.appendChild(btn);

});

startTimer();

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--;

timerEl.textContent=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

showCorrectAnswer();

}

},1000);

}

function checkAnswer(selected,btn){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll('.optionBtn');

buttons.forEach(b=>b.disabled=true);

if(selected===q.answer){

btn.classList.add('correct');

score++;

scoreEl.textContent=score;

feedback.className=
"feedback correctFeedback";

feedback.style.display="block";

feedback.innerHTML=
"✅ Correct!<br><br>"+q.explanation;

playSound(correctSound);

createConfetti();

clearInterval(timer);

showNextButton();

}else{

btn.classList.add('wrong');

playSound(wrongSound);

showCross();

if(!retryUsed){

retryUsed=true;

hintBox.style.display="block";

hintBox.innerHTML=
"💡 Hint: "+q.hint;

buttons.forEach((b,index)=>{

if(index!==selected){

b.disabled=false;

}

});

}else{

buttons[q.answer].classList.add('correct');

feedback.className=
"feedback wrongFeedback";

feedback.style.display="block";

feedback.innerHTML=
"❌ Correct Answer: <b>"
+q.options[q.answer]+
"</b><br><br>"
+q.explanation;

clearInterval(timer);

showNextButton();

}

}

}

function showCorrectAnswer(){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll('.optionBtn');

buttons.forEach(b=>b.disabled=true);

buttons[q.answer].classList.add('correct');

feedback.className=
"feedback wrongFeedback";

feedback.style.display="block";

feedback.innerHTML=
"⏰ Time Up!<br><br>Correct Answer: <b>"
+q.options[q.answer]+
"</b><br><br>"
+q.explanation;

showNextButton();

}

function showNextButton(){

nextBtn.classList.remove('hidden');

if(currentQuestion===questions.length-1){

nextBtn.textContent="Submit Quiz";

}else{

nextBtn.textContent="Next Question";

}

nextBtn.onclick=()=>{

currentQuestion++;

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResults();

}

};

}
function showResults(){

quizScreen.classList.add('hidden');

resultScreen.classList.remove('hidden');

const percentage=Math.round(
(score/questions.length)*100
);

let message="";

if(percentage>=75){

message="💧 Excellent! You have a strong understanding of water conservation, groundwater, pollution, the water cycle and sustainable water management.";

}else if(percentage>=40){

message="🌊 Good effort! Review the chapter and try again.";

}else{

message="☁️ Keep learning! A little more revision will strengthen your understanding of water and its importance.";

}

document.getElementById('finalScore').innerHTML=
`Your Score: ${score} / ${questions.length}<br><br>
Percentage: ${percentage}%`;

document.getElementById('resultMessage').innerHTML=
message;

playSound(clapSound);

}

function createConfetti(){

for(let i=0;i<25;i++){

const piece=document.createElement('div');

piece.classList.add('confetti');

piece.style.left=
Math.random()*100+'vw';

piece.style.background=
[
'#0ea5e9',
'#38bdf8',
'#7dd3fc',
'#22c55e'
][Math.floor(Math.random()*4)];

document.body.appendChild(piece);

setTimeout(()=>{

piece.remove();

},2500);

}

}

function showCross(){

const cross=document.createElement('div');

cross.classList.add('cross');

cross.innerHTML='✖';

document.body.appendChild(cross);

setTimeout(()=>{

cross.remove();

},1000);

}

</script>

</body>
</html>
