<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adolescence: From Childhood to Adulthood</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
background:linear-gradient(
180deg,
#fff8f1 0%,
#fefce8 40%,
#ffffff 100%
);
position:relative;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:-5;
}

.floatIcon{
position:fixed;
font-size:42px;
opacity:.16;
animation:float 14s ease-in-out infinite;
pointer-events:none;
z-index:-4;
}

.baby{left:8%;top:15%;}
.child{right:12%;top:20%;animation-delay:2s;}
.teen{left:18%;bottom:18%;animation-delay:4s;}
.sports{right:20%;bottom:20%;animation-delay:6s;}
.food{left:48%;top:10%;animation-delay:1s;}
.water{right:38%;top:12%;animation-delay:3s;}
.hygiene{left:38%;bottom:10%;animation-delay:5s;}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-20px);
}

100%{
transform:translateY(0px);
}

}

.spark{
position:absolute;
font-size:26px;
opacity:.12;
animation:sparkle linear infinite;
}

.s1{left:10%;top:25%;animation-duration:10s;}
.s2{left:30%;top:70%;animation-duration:12s;}
.s3{left:60%;top:20%;animation-duration:11s;}
.s4{left:80%;top:65%;animation-duration:13s;}
.s5{left:50%;top:45%;animation-duration:9s;}

@keyframes sparkle{

0%{
transform:scale(.7);
opacity:.05;
}

50%{
transform:scale(1.2);
opacity:.18;
}

100%{
transform:scale(.7);
opacity:.05;
}

}

#logoScreen{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#logoScreen img{
width:180px;
animation:zoomIn 1s ease;
}

@keyframes zoomIn{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.container{
max-width:950px;
margin:25px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.95);
backdrop-filter:blur(8px);
padding:28px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
text-align:center;
font-size:2.5rem;
color:#7c3aed;
}

h2{
text-align:center;
margin-top:10px;
color:#444;
}

.btn{
background:#2563eb;
color:white;
border:none;
padding:14px 28px;
border-radius:12px;
cursor:pointer;
font-size:1rem;
}

.btn:hover{
background:#1d4ed8;
}

.hidden{
display:none;
}

.topBar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.questionBox,
.scoreBox,
.timerBox{
background:#dbeafe;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
color:#0d47a1;
}

.audioBtn{
background:#555;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

.question{
font-size:1.15rem;
line-height:1.8;
margin-bottom:20px;
white-space:pre-line;
}

.questionImage{
width:100%;
max-height:380px;
object-fit:contain;
background:white;
border:2px solid #ddd;
border-radius:16px;
padding:10px;
margin-bottom:20px;
}

.options{
display:grid;
gap:12px;
}

.optionBtn{
padding:14px;
border:none;
border-radius:12px;
background:#f8fafc;
cursor:pointer;
font-size:1rem;
text-align:left;
transition:.3s;
}

.optionBtn:hover{
background:#dbeafe;
}

.correct{
background:#d4f7d9 !important;
border:2px solid green;
}

.wrong{
background:#ffd9d9 !important;
border:2px solid red;
}

.feedback{
display:none;
padding:15px;
margin-top:15px;
border-radius:12px;
font-weight:bold;
line-height:1.6;
}

.correctFeedback{
background:#d4f7d9;
}

.wrongFeedback{
background:#ffd9d9;
}

.hintBox{
display:none;
margin-top:15px;
padding:14px;
background:#fff8d6;
border-left:5px solid orange;
border-radius:10px;
font-weight:bold;
}

.confetti{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
animation:fall 2s linear forwards;
z-index:999;
}

@keyframes fall{

0%{
transform:translateY(-20px);
opacity:1;
}

100%{
transform:translateY(100vh);
opacity:0;
}

}

.cross{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
color:red;
animation:fade 1s forwards;
z-index:999;
}

@keyframes fade{

0%{
opacity:1;
}

100%{
opacity:0;
}

}

@media(max-width:600px){

.question{
font-size:1rem;
}

.optionBtn{
font-size:.95rem;
}

}

</style>
</head>

<body>

<div class="bg">

<div class="spark s1">✨</div>
<div class="spark s2">✨</div>
<div class="spark s3">✨</div>
<div class="spark s4">✨</div>
<div class="spark s5">✨</div>

</div>

<div class="floatIcon baby">👶</div>
<div class="floatIcon child">🧒</div>
<div class="floatIcon teen">🧑</div>
<div class="floatIcon sports">⚽</div>
<div class="floatIcon food">🥗</div>
<div class="floatIcon water">💧</div>
<div class="floatIcon hygiene">🧼</div>

<div id="logoScreen">
<img src="assets/innovine-logo.png">
</div>

<div class="container">

<div id="introScreen" class="card">

<h1>Adolescence: From Childhood to Adulthood</h1>

<h2>Grade 7 Science</h2>

<p style="margin-top:25px;text-align:center;line-height:1.8;">
Explore adolescence, growth spurts,
puberty, hygiene, nutrition, emotional changes
and healthy life choices through 12 competency-based challenges.
</p>

<div style="text-align:center;margin-top:30px;">
<button class="btn" onclick="startQuiz()">
Start Challenge
</button>
</div>

</div>

<div id="quizScreen" class="card hidden">

<div class="topBar">

<div class="questionBox">
Question <span id="qNo">1</span>/12
</div>

<div class="scoreBox">
Score: <span id="score">0</span>
</div>

<div class="timerBox">
⏳ <span id="timer">45</span>s
</div>

<button id="muteBtn" class="audioBtn">
🔊 Sound On
</button>

</div>

<img id="questionImage" class="questionImage hidden">

<div id="questionText" class="question"></div>

<div id="optionsContainer" class="options"></div>

<div id="hintBox" class="hintBox"></div>

<div id="feedback" class="feedback"></div>

<div style="text-align:center;margin-top:20px;">
<button id="nextBtn" class="btn hidden">
Next Question
</button>
</div>

</div>

<div id="resultScreen" class="card hidden">

<h1>Quiz Completed!</h1>

<h2 id="finalScore"></h2>

<p id="resultMessage"
style="text-align:center;margin-top:20px;font-size:1.1rem;">
</p>

<div style="text-align:center;margin-top:25px;">
<button class="btn" onclick="location.reload()">
Play Again
</button>
</div>

</div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

const questions = [
{
question:"A child is 12 years old and has started showing signs of rapid growth.\n\nWhich stage of life is the child entering?",
options:[
"Infancy",
"Childhood",
"Adolescence",
"Old age"
],
answer:2,
hint:"This stage usually begins around 10–19 years.",
explanation:"Adolescence is the period between childhood and adulthood when rapid growth and development occur."
},

{
question:"Riya notices that she has grown taller by several centimetres within a year.\n\nThis rapid increase in height is called:",
options:[
"Ageing",
"Growth spurt",
"Menstruation",
"Maturation"
],
answer:1,
hint:"It is one of the most noticeable changes during adolescence.",
explanation:"Adolescents experience a rapid increase in height known as a growth spurt."
},

{
question:"Aryan finds that his voice occasionally cracks while speaking.\n\nWhat is the most likely reason?",
options:[
"Throat infection",
"Growth of the voice box during adolescence",
"Poor nutrition",
"Excess exercise"
],
answer:1,
hint:"The larynx becomes larger during puberty.",
explanation:"Growth of the voice box causes temporary voice cracking, especially in boys."
},

{
question:"Which of the following is a secondary sexual characteristic in boys?",
options:[
"Increase in height",
"Growth of facial hair",
"Development of lungs",
"Growth of teeth"
],
answer:1,
hint:"It helps distinguish males and females after puberty.",
explanation:"Growth of moustache and beard are secondary sexual characteristics in boys."
},

{
question:"A girl experiences menstruation for the first time.\n\nWhat does this indicate?",
options:[
"Illness",
"Injury",
"Her body has begun reproductive maturity",
"Weakness"
],
answer:2,
hint:"It is a normal part of growing up.",
explanation:"Menstruation indicates that the reproductive system has started functioning."
},

{
question:"A teenager feels very happy one day and upset the next without any major reason.\n\nWhat is the most likely cause?",
options:[
"Lack of sleep only",
"Hormonal changes during adolescence",
"Poor eyesight",
"Lack of exercise"
],
answer:1,
hint:"Hormones affect mood and behaviour.",
explanation:"Hormonal changes during adolescence can lead to mood swings and emotional sensitivity."
},
{
question:"Which nutrient is especially important for building muscles during adolescence?",
options:[
"Vitamins",
"Water",
"Proteins",
"Fibre"
],
answer:2,
hint:"It is called the body-building nutrient.",
explanation:"Proteins support growth, muscle development, and tissue repair."
},

{
question:"Why is regular bathing important during adolescence?",
options:[
"To increase height",
"To remove sweat, dirt, and germs",
"To improve eyesight",
"To reduce hunger"
],
answer:1,
hint:"Sweat glands become more active during adolescence.",
explanation:"Maintaining hygiene helps prevent infections, body odour, and skin problems."
},

{
question:"A friend pressures Karan to try smoking.\n\nWhat is the most responsible action?",
options:[
"Try it once",
"Accept to avoid embarrassment",
"Say 'No' firmly and confidently",
"Hide it from parents"
],
answer:2,
hint:"Healthy choices protect long-term health.",
explanation:"Adolescents should refuse harmful substances and seek support if pressured."
},

{
question:"Which stage comes immediately after childhood?",
image:"assets/stages-of-life.png",
options:[
"Infancy",
"Adolescence",
"Adulthood",
"Old age"
],
answer:1,
hint:"It is the stage associated with puberty.",
explanation:"Adolescence follows childhood and precedes adulthood."
},

{
question:"What common benefit do all the activities shown provide?",
image:"assets/healthy-adolescence.png",
options:[
"Increase screen time",
"Support healthy adolescent growth",
"Reduce learning ability",
"Prevent ageing"
],
answer:1,
hint:"Think about health and fitness.",
explanation:"Exercise, healthy food, and hydration promote proper growth and well-being during adolescence."
},

{
question:`Two classmates are 13 years old.

One has developed facial hair and a deeper voice,
while the other has not yet shown these changes.

What is the best explanation?`,
options:[
"One is unhealthy.",
"Adolescence occurs at the same rate in everyone.",
"Physical changes during adolescence occur at different times for different individuals.",
"One has a disease."
],
answer:2,
hint:"Not all adolescents grow at the same pace.",
explanation:"The timing of adolescent changes varies from person to person and is completely normal."
}

];
let currentQuestion=0;
let score=0;
let retryUsed=false;
let timer;
let timeLeft=45;
let soundEnabled=true;

const introScreen=document.getElementById('introScreen');
const quizScreen=document.getElementById('quizScreen');
const resultScreen=document.getElementById('resultScreen');

const qNo=document.getElementById('qNo');
const scoreEl=document.getElementById('score');
const timerEl=document.getElementById('timer');

const questionText=document.getElementById('questionText');
const optionsContainer=document.getElementById('optionsContainer');
const feedback=document.getElementById('feedback');
const hintBox=document.getElementById('hintBox');
const questionImage=document.getElementById('questionImage');
const nextBtn=document.getElementById('nextBtn');

const correctSound=document.getElementById('correctSound');
const wrongSound=document.getElementById('wrongSound');
const clapSound=document.getElementById('clapSound');

setTimeout(()=>{

document.getElementById('logoScreen').style.display='none';

},5000);

document.getElementById('muteBtn').onclick=()=>{

soundEnabled=!soundEnabled;

document.getElementById('muteBtn').textContent=
soundEnabled ? "🔊 Sound On" : "🔇 Sound Off";

};

function playSound(audio){

if(soundEnabled){

audio.currentTime=0;
audio.play();

}

}

function shuffleQuestions(){

for(let i=questions.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[questions[i],questions[j]]=
[questions[j],questions[i]];

}

}

function startQuiz(){

shuffleQuestions();

introScreen.classList.add('hidden');
quizScreen.classList.remove('hidden');

loadQuestion();

}

function loadQuestion(){

clearInterval(timer);

timeLeft=45;
timerEl.textContent=timeLeft;

retryUsed=false;

feedback.innerHTML="";
feedback.style.display="none";

hintBox.innerHTML="";
hintBox.style.display="none";

nextBtn.classList.add('hidden');

const q=questions[currentQuestion];

qNo.textContent=currentQuestion+1;

questionText.innerHTML=q.question;

optionsContainer.innerHTML="";

if(q.image){

questionImage.src=q.image;
questionImage.style.display="block";
questionImage.classList.remove('hidden');

}else{

questionImage.removeAttribute("src");
questionImage.style.display="none";
questionImage.classList.add('hidden');

}

q.options.forEach((option,index)=>{

const btn=document.createElement('button');

btn.classList.add('optionBtn');

btn.textContent=option;

btn.onclick=()=>checkAnswer(index,btn);

optionsContainer.appendChild(btn);

});

startTimer();

}
function startTimer(){

timer=setInterval(()=>{

timeLeft--;

timerEl.textContent=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

showCorrectAnswer();

}

},1000);

}

function checkAnswer(selected,btn){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll('.optionBtn');

buttons.forEach(b=>b.disabled=true);

if(selected===q.answer){

btn.classList.add('correct');

score++;

scoreEl.textContent=score;

feedback.className=
"feedback correctFeedback";

feedback.style.display="block";

feedback.innerHTML=
"✅ Correct!<br><br>"+q.explanation;

playSound(correctSound);

createConfetti();

clearInterval(timer);

showNextButton();

}else{

btn.classList.add('wrong');

playSound(wrongSound);

showCross();

if(!retryUsed){

retryUsed=true;

hintBox.style.display="block";

hintBox.innerHTML=
"💡 Hint: "+q.hint;

buttons.forEach((b,index)=>{

if(index!==selected){

b.disabled=false;

}

});

}else{

buttons[q.answer].classList.add('correct');

feedback.className=
"feedback wrongFeedback";

feedback.style.display="block";

feedback.innerHTML=
"❌ Correct Answer: <b>"
+q.options[q.answer]+
"</b><br><br>"
+q.explanation;

clearInterval(timer);

showNextButton();

}

}

}

function showCorrectAnswer(){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll('.optionBtn');

buttons.forEach(b=>b.disabled=true);

buttons[q.answer].classList.add('correct');

feedback.className=
"feedback wrongFeedback";

feedback.style.display="block";

feedback.innerHTML=
"⏰ Time Up!<br><br>Correct Answer: <b>"
+q.options[q.answer]+
"</b><br><br>"
+q.explanation;

showNextButton();

}

function showNextButton(){

nextBtn.classList.remove('hidden');

if(currentQuestion===questions.length-1){

nextBtn.textContent="Submit Quiz";

}else{

nextBtn.textContent="Next Question";

}

nextBtn.onclick=()=>{

currentQuestion++;

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResults();

}

};

}

function showResults(){

quizScreen.classList.add('hidden');

resultScreen.classList.remove('hidden');

const percentage=
Math.round((score/questions.length)*100);

let message="";

if(percentage>=75){

message="🌟 Excellent! You have mastered adolescence, growth, hygiene, nutrition and healthy life choices.";

}else if(percentage>=40){

message="💪 Good effort! Review the chapter and try again.";

}else{

message="📚 Keep learning! Revise the concepts and attempt again.";

}

document.getElementById('finalScore').innerHTML=
`Your Score: ${score} / ${questions.length}<br><br>
Percentage: ${percentage}%`;

document.getElementById('resultMessage').innerHTML=
message;

playSound(clapSound);

}

function createConfetti(){

for(let i=0;i<25;i++){

const piece=document.createElement('div');

piece.classList.add('confetti');

piece.style.left=
Math.random()*100+'vw';

piece.style.background=
[
'#22c55e',
'#84cc16',
'#0ea5e9',
'#facc15'
][Math.floor(Math.random()*4)];

document.body.appendChild(piece);

setTimeout(()=>{

piece.remove();

},2500);

}

}

function showCross(){

const cross=document.createElement('div');

cross.classList.add('cross');

cross.innerHTML='✖';

document.body.appendChild(cross);

setTimeout(()=>{

cross.remove();

},1000);

}

</script>

</body>
</html>
